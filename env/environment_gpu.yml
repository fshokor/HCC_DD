name: hcc_drug_discovery_gpu

# =============================================================================
# GPU variant — requires NVIDIA GPU with CUDA 12.1 driver or later.
# For CPU-only machines use env/environment.yml instead.
#
# Usage:
#   conda env create -f env/environment_gpu.yml
#   conda activate hcc_drug_discovery_gpu
#   Rscript env/r_packages.R
# =============================================================================

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:

  - python=3.12

  # ── PyTorch with CUDA 12.1 ──────────────────────────────────────────────────
  - pytorch::pytorch>=2.2,<2.6
  - pytorch::pytorch-cuda=12.1

  # ── Core scientific stack ───────────────────────────────────────────────────
  - conda-forge::numpy>=1.26,<2.0
  - conda-forge::pandas>=2.1
  - conda-forge::scipy>=1.11
  - conda-forge::matplotlib>=3.8
  - conda-forge::seaborn>=0.13

  # ── Single-cell RNA-seq ─────────────────────────────────────────────────────
  - conda-forge::scanpy>=1.10
  - conda-forge::anndata>=0.10
  - conda-forge::leidenalg>=0.10
  - conda-forge::python-igraph>=0.11

  # ── R interface ─────────────────────────────────────────────────────────────
  - conda-forge::rpy2>=3.5

  # ── Network, HTTP, ML ───────────────────────────────────────────────────────
  - conda-forge::networkx>=3.2
  - conda-forge::requests>=2.31
  - conda-forge::scikit-learn>=1.4
  - conda-forge::lifelines>=0.28

  # ── Jupyter ─────────────────────────────────────────────────────────────────
  - conda-forge::jupyterlab>=4.0
  - conda-forge::notebook>=7.0
  - conda-forge::ipykernel>=6.29
  - conda-forge::ipywidgets>=8.1
  - conda-forge::nbformat>=5.9
  - conda-forge::nbconvert>=7.0

  - pip
  - pip:
      - celltypist>=1.6
      - anndata2ri>=1.3
      # GPU wheels — cu121 tag matches pytorch-cuda=12.1 above
      - torch-geometric>=2.5
      - torch-scatter
      - torch-sparse
      - torch-cluster
      - torch-spline-conv
